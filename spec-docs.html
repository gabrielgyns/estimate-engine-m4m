<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estimate Engine — Documentação</title>

    <!-- Renderer + syntax highlight (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    >
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
    ></script>

    <style>
    :root {
      --bg: #09090b;
      --bg-soft: #111114;
      --panel: #18181b;
      --border: #27272a;
      --text: #e4e4e7;
      --muted: #a1a1aa;
      --faint: #71717a;
      --accent: #3b82f6;
      --accent-soft: #1d4ed833;
    }
    * {
      box-sizing: border-box;
    }
    html,
    body {
      height: 100%;
      margin: 0;
    }
    body {
      display: grid;
      grid-template-columns: 290px 1fr;
      height: 100vh;
      overflow: hidden;
      font:
        15px / 1.65 -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    /* Sidebar */
    aside {
      padding: 22px 16px 60px;
      overflow-y: auto;
      background: var(--bg-soft);
      border-right: 1px solid var(--border);
    }
    .brand {
      padding: 4px 8px 18px;
    }
    .brand h1 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.2px;
    }
    .brand p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--faint);
    }
    .group-label {
      padding: 18px 8px 8px;
      font-size: 11px;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    nav a {
      display: flex;
      gap: 8px;
      align-items: baseline;
      padding: 7px 10px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      border-radius: 8px;
    }
    nav a:hover {
      color: var(--text);
      background: var(--panel);
    }
    nav a.active {
      color: #fff;
      background: var(--accent-soft);
    }
    nav a .num {
      min-width: 20px;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: var(--faint);
    }
    nav a.active .num {
      color: #93c5fd;
    }

    /* Main */
    main {
      position: relative;
      padding: 0;
      overflow-y: auto;
    }
    .content {
      max-width: 860px;
      padding: 48px 48px 120px;
      margin: 0 auto;
    }
    .loading,
    .errbox {
      padding: 40px 0;
      color: var(--muted);
    }
    .errbox code {
      padding: 2px 7px;
      color: #fdba74;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    /* Markdown typography */
    .content h1,
    .content h2,
    .content h3,
    .content h4 {
      font-weight: 650;
      line-height: 1.3;
    }
    .content h1 {
      margin: 0 0 18px;
      font-size: 28px;
    }
    .content h2 {
      padding-bottom: 7px;
      margin: 38px 0 12px;
      font-size: 21px;
      border-bottom: 1px solid var(--border);
    }
    .content h3 {
      margin: 26px 0 10px;
      font-size: 17px;
    }
    .content h4 {
      margin: 20px 0 8px;
      font-size: 15px;
      color: var(--muted);
    }
    .content p,
    .content li {
      color: var(--text);
    }
    .content a {
      color: #60a5fa;
    }
    .content strong {
      color: #fff;
    }
    .content code {
      padding: 1px 6px;
      font-family:
        "SF Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      color: #f4a261;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 5px;
    }
    .content pre {
      padding: 16px 18px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.55;
      background: #0d0d10;
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .content pre code {
      padding: 0;
      font-size: 13px;
      color: var(--text);
      background: none;
      border: none;
    }
    .content blockquote {
      padding: 8px 16px;
      margin: 16px 0;
      color: var(--muted);
      background: var(--bg-soft);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
    }
    .content table {
      display: block;
      width: 100%;
      margin: 18px 0;
      overflow-x: auto;
      font-size: 14px;
      border-collapse: collapse;
    }
    .content th,
    .content td {
      padding: 8px 12px;
      text-align: left;
      border: 1px solid var(--border);
    }
    .content th {
      background: var(--panel);
    }
    .content tr:nth-child(even) td {
      background: var(--bg-soft);
    }
    .content hr {
      margin: 32px 0;
      border: none;
      border-top: 1px solid var(--border);
    }
    .content ul,
    .content ol {
      padding-left: 22px;
    }
    .content li {
      margin: 4px 0;
    }
    .content input[type="checkbox"] {
      margin-right: 8px;
    }

    /* Prev/Next */
    .pager {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-top: 56px;
    }
    .pager a {
      flex: 1;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .pager a:hover {
      color: var(--text);
      border-color: var(--accent);
    }
    .pager a.next {
      text-align: right;
    }
    .pager span {
      display: block;
      margin-bottom: 3px;
      font-size: 11px;
      color: var(--faint);
    }

    @media (max-width: 760px) {
      body {
        grid-template-columns: 1fr;
      }
      aside {
        display: none;
      }
      .content {
        padding: 28px 20px 100px;
      }
    }
    </style>
  </head>
  <body>
    <aside>
      <div class="brand">
        <h1>Estimate Engine</h1>
        <p>Documentação · Fases 1–2</p>
      </div>
      <nav id="nav"></nav>
    </aside>

    <main>
      <div class="content" id="content">
        <p class="loading">Carregando…</p>
      </div>
    </main>

    <script>
    "use strict";
    // Lista de documentos, na ordem de leitura.
    const DOCS = [
      {
        group: "Fase 1 · Calculadora",
        num: "00",
        id: "00-visao-geral",
        title: "Visão geral",
        path: "docs/guides/00-visao-geral.md",
      },
      {
        group: "Fase 1 · Calculadora",
        num: "01",
        id: "01-money-e-tdd",
        title: "Money & TDD",
        path: "docs/guides/01-money-e-tdd.md",
      },
      {
        group: "Fase 1 · Calculadora",
        num: "02",
        id: "02-modelo-de-dominio",
        title: "Modelo de domínio",
        path: "docs/guides/02-modelo-de-dominio.md",
      },
      {
        group: "Fase 1 · Calculadora",
        num: "03",
        id: "03-engine-de-calculo",
        title: "Engine de cálculo",
        path: "docs/guides/03-engine-de-calculo.md",
      },
      {
        group: "Fase 1 · Calculadora",
        num: "04",
        id: "04-validacao",
        title: "Validação",
        path: "docs/guides/04-validacao.md",
      },
      {
        group: "Fase 1 · Calculadora",
        num: "05",
        id: "05-persistencia-postgres",
        title: "Persistência (Postgres)",
        path: "docs/guides/05-persistencia-postgres.md",
      },
      {
        group: "Fase 1 · Calculadora",
        num: "06",
        id: "06-http-api",
        title: "HTTP API (Fastify)",
        path: "docs/guides/06-http-api.md",
      },
      {
        group: "Fase 1 · Calculadora",
        num: "07",
        id: "07-frontend-calculadora",
        title: "Frontend: Calculadora",
        path: "docs/guides/07-frontend-calculadora.md",
      },
      {
        group: "Fase 1 · Calculadora",
        num: "08",
        id: "08-frontend-config",
        title: "Frontend: Config",
        path: "docs/guides/08-frontend-config.md",
      },
      {
        group: "Fase 1 · Calculadora",
        num: "09",
        id: "09-organizacao-do-projeto",
        title: "Organização do projeto",
        path: "docs/guides/09-organizacao-do-projeto.md",
      },
      {
        group: "Fase 2 · Estimates",
        num: "10",
        id: "10-estimate-dominio-e-status",
        title: "Domínio & máquina de estado",
        path: "docs/guides/10-estimate-dominio-e-status.md",
      },
      {
        group: "Fase 2 · Estimates",
        num: "11",
        id: "11-persistencia-estimates",
        title: "Persistência das estimates",
        path: "docs/guides/11-persistencia-estimates.md",
      },
      {
        group: "Fase 2 · Estimates",
        num: "12",
        id: "12-http-e-pagina-publica",
        title: "HTTP & página pública",
        path: "docs/guides/12-http-e-pagina-publica.md",
      },
      {
        group: "Fase 2 · Estimates",
        num: "13",
        id: "13-frontend-estimates-e-router",
        title: "Frontend: estimates & router",
        path: "docs/guides/13-frontend-estimates-e-router.md",
      },
      {
        group: "Referência",
        num: "·",
        id: "spec",
        title: "Spec — Fase 1",
        path: "docs/specs/2026-06-22-estimate-engine-calculadora-design.md",
      },
      {
        group: "Referência",
        num: "·",
        id: "plano",
        title: "Plano — Fase 1",
        path: "docs/plans/2026-06-22-fase-1-calculadora.md",
      },
      {
        group: "Referência",
        num: "·",
        id: "spec-fase-2",
        title: "Spec — Fase 2",
        path: "docs/specs/2026-06-25-estimate-engine-fase-2-estimates-design.md",
      },
      {
        group: "Referência",
        num: "·",
        id: "plano-fase-2",
        title: "Plano — Fase 2",
        path: "docs/plans/2026-06-25-fase-2-estimates.md",
      },
    ];

    marked.setOptions({ gfm: true, breaks: false });

    // Monta o menu lateral, agrupado.
    const nav = document.getElementById("nav");
    let lastGroup = null;
    for (const doc of DOCS) {
      if (doc.group !== lastGroup) {
        const label = document.createElement("div");
        label.className = "group-label";
        label.textContent = doc.group;
        nav.appendChild(label);
        lastGroup = doc.group;
      }
      const a = document.createElement("a");
      a.href = "#" + doc.id;
      a.dataset.id = doc.id;
      a.innerHTML = `<span class="num">${doc.num}</span><span>${doc.title}</span>`;
      nav.appendChild(a);
    }

    const content = document.getElementById("content");

    function indexOfId(id) {
      return DOCS.findIndex((d) => d.id === id);
    }

    function setActive(id) {
      document.querySelectorAll("nav a").forEach((a) => {
        a.classList.toggle("active", a.dataset.id === id);
      });
    }

    function pager(i) {
      const prev = DOCS[i - 1];
      const next = DOCS[i + 1];
      let html = '<div class="pager">';
      html += prev
        ? `<a href="#${prev.id}"><span>← Anterior</span>${prev.title}</a>`
        : "<a style='visibility:hidden'></a>";
      html += next
        ? `<a class="next" href="#${next.id}"><span>Próximo →</span>${next.title}</a>`
        : "<a class='next' style='visibility:hidden'></a>";
      html += "</div>";
      return html;
    }

    async function render(id) {
      let i = indexOfId(id);
      if (i < 0) {
        i = 0;
      }
      const doc = DOCS[i];
      setActive(doc.id);
      content.innerHTML = '<p class="loading">Carregando…</p>';

      try {
        const res = await fetch(doc.path);
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        const md = await res.text();
        content.innerHTML = marked.parse(md) + pager(i);
        content
          .querySelectorAll("pre code")
          .forEach((el) => hljs.highlightElement(el));
        document.querySelector("main").scrollTo(0, 0);
      } catch (err) {
        content.innerHTML =
          '<div class="errbox"><h2>Não consegui carregar o arquivo</h2>' +
          "<p>O navegador bloqueia <code>fetch</code> de arquivos locais quando você abre o HTML direto (<code>file://</code>). " +
          "Sirva a pasta com um servidor estático e abra pela URL:</p>" +
          "<pre><code># na raiz do repositório (~/Dev/estimate-engine)\n" +
          "npx serve\n# ou\npython3 -m http.server 3000</code></pre>" +
          "<p>Depois abra <code>http://localhost:3000</code> (ou a porta indicada).</p>" +
          "<p style='color:#71717a'>Detalhe técnico: " +
          String(err) +
          "</p></div>";
        content
          .querySelectorAll("pre code")
          .forEach((el) => hljs.highlightElement(el));
      }
    }

    function route() {
      const id = location.hash.replace(/^#/, "") || DOCS[0].id;
      render(id);
    }

    window.addEventListener("hashchange", route);
    route();
    </script>
  </body>
</html>
